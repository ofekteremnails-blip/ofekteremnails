<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>צ'אט בוט | אופק תרם ניילס</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    .chatbot-container { max-width: 600px; margin: 80px auto 40px; padding: 20px; }
    .chat-header {
      background: linear-gradient(135deg, var(--rose), var(--mauve));
      color: #fff; padding: 24px; border-radius: 4px 4px 0 0; text-align: center;
    }
    .chat-header h1 { font-family: 'DM Serif Display', serif; font-size: 28px; margin: 0 0 8px; font-weight: 400; }
    .chat-header p { margin: 0; opacity: 0.9; font-size: 14px; }
    .chat-messages {
      background: #fff; min-height: 400px; max-height: 500px;
      overflow-y: auto; padding: 24px;
      border-left: 1px solid var(--border); border-right: 1px solid var(--border);
    }
    .chat-message { margin-bottom: 16px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .message-bot { display: flex; gap: 12px; align-items: start; }
    .message-user { display: flex; gap: 12px; align-items: start; flex-direction: row-reverse; }
    .message-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .bot-avatar { background: linear-gradient(135deg, var(--rose), var(--mauve)); }
    .user-avatar { background: var(--deep); }
    .message-bubble { max-width: 75%; padding: 12px 16px; border-radius: 16px; line-height: 1.6; font-size: 15px; }
    .bot-bubble { background: var(--cream); color: var(--text); border-bottom-left-radius: 4px; }
    .user-bubble { background: var(--deep); color: #fff; border-bottom-right-radius: 4px; }
    .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding: 0 52px; }
    .quick-reply-btn {
      background: #fff; border: 1.5px solid var(--rose); color: var(--deep);
      padding: 10px 16px; border-radius: 50px; font-size: 14px; cursor: pointer;
      transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .quick-reply-btn:hover { background: var(--blush); border-color: var(--mauve); transform: translateY(-2px); }
    .chat-input-area {
      background: #fff; padding: 20px 24px; border-radius: 0 0 4px 4px;
      border: 1px solid var(--border); border-top: none;
      box-shadow: 0 4px 20px rgba(107,76,85,0.08);
    }
    .chat-input-wrapper { display: flex; gap: 12px; }
    .chat-input {
      flex: 1; padding: 12px 16px; border: 1px solid var(--border);
      border-radius: 50px; font-size: 15px; font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s; outline: none; background: var(--cream);
    }
    .chat-input:focus { border-color: var(--mauve); background: #fff; }
    .chat-send-btn {
      background: linear-gradient(135deg, var(--rose), var(--mauve));
      color: #fff; border: none; width: 48px; height: 48px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 20px; transition: transform 0.2s;
    }
    .chat-send-btn:hover { transform: scale(1.1); }
    .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; }
    .typing-dot { width: 8px; height: 8px; background: var(--border); border-radius: 50%; animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-10px); } }
    .chat-footer { text-align: center; margin-top: 24px; padding: 20px; }
    .chat-footer a { color: var(--mauve); text-decoration: none; font-size: 14px; transition: color 0.2s; }
    .chat-footer a:hover { color: var(--rose); }
    @media (max-width: 768px) {
      .chatbot-container { margin: 60px 0 20px; padding: 0; }
      .chat-header { border-radius: 0; }
      .chat-input-area { border-radius: 0; }
      .message-bubble { max-width: 85%; }
      .quick-replies { padding: 0 12px; }
    }
  </style>
</head>
<body>

  <nav class="navbar scrolled" id="navbar">
    <a href="index.html"><img src="logo.png" alt="אופק תרם ניילס" class="logo"/></a>
    <a href="index.html" class="home-btn-nav">🏠 דף הבית</a>
  </nav>

  <div class="chatbot-container">
    <div class="chat-header">
      <h1>💅 צ'אט בוט</h1>
      <p>שאלי אותי כל שאלה ואענה לך מיד!</p>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <input type="text" class="chat-input" id="chatInput" placeholder="כתבי את השאלה שלך..."/>
        <button class="chat-send-btn" id="sendBtn">➤</button>
      </div>
    </div>
    <div class="chat-footer">
      <a href="index.html">🏠 חזרה לדף הבית</a>
      <span style="color:var(--border);margin:0 12px">|</span>
      <a href="booking.html">📅 קביעת תור</a>
      <span style="color:var(--border);margin:0 12px">|</span>
      <a href="https://wa.me/972546827299" target="_blank">💬 וואטסאפ</a>
    </div>
  </div>

  <script src="booking.js"></script>
  <script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput   = document.getElementById('chatInput');
    const sendBtn     = document.getElementById('sendBtn');

    async function initChatbot() {
      try { await loadSettingsFromSheets(); } catch(e) {}
      setTimeout(() => {
        addMessage(
          'היי! 👋 אני הצ\'אט בוט של אופק 💅\n\nאני כאן כדי לענות על כל השאלות שלך!\n\nמה תרצי לדעת?',
          false,
          ['שעות פעילות', 'כמה עולה לק ג\'ל?', 'איפה את נמצאת?', 'קביעת תור']
        );
      }, 500);
    }

    function getServicesText() {
      const services = getServices();
      let text = '💰 מחירון השירותים:\n\n';
      services.forEach(s => { text += `${s.icon} ${s.name} - ₪${s.price}\n`; });
      text += '\n⏱️ משך הטיפולים:\n';
      services.forEach(s => { if (s.duration > 0) text += `• ${s.name}: ${s.duration} דקות\n`; });
      text += '\n📞 למבצעים ומחירים מיוחדים - צרי קשר בוואטסאפ! 💕';
      return text;
    }

    const faqData = {
      'שעות פעילות': {
        answer: '🕐 שעות הפעילות שלי:\n\n🗓️ ראשון - חמישי: 10:00-20:00\n🗓️ שישי: 10:00-14:00\n🗓️ שבת: סגור\n\n💡 ניתן לתאם תורים מיוחדים בשעות אחרות לפי בקשה 💅',
        quickReplies: ['כמה עולה לק ג\'ל?', 'איפה את נמצאת?', 'קביעת תור']
      },
      'מחיר': {
        get answer() { return getServicesText(); },
        quickReplies: ['שעות פעילות', 'איפה את נמצאת?', 'קביעת תור בוואטסאפ']
      },
      'מיקום': {
        answer: '📍 הכתובת המדויקת תישלח לך בוואטסאפ:\n• בעת קביעת התור\n• או פשוט שלחי הודעה ואשלח לך מיד\n\n🚗 חניות בשפע באזור!\n\n💬 לחצי על הכפתור למטה לקבלת הכתובת 💅',
        quickReplies: ['קבלת כתובת בוואטסאפ', 'קביעת תור', 'שעות פעילות']
      },
      'תור': {
        answer: '📅 מעולה! בואי נקבע לך תור\n\nאת יכולה לקבוע תור בשתי דרכים:\n\n1️⃣ דרך האתר - לחצי על הכפתור למטה\n2️⃣ דרך וואטסאפ - שלחי לי הודעה\n\nמה נוח לך יותר? 💅',
        quickReplies: ['קביעת תור באתר', 'קביעת תור בוואטסאפ']
      },
      'כמה זמן': {
        get answer() {
          const services = getServices();
          let text = '⏱️ משך הטיפולים:\n\n';
          services.forEach(s => { if (s.duration > 0) text += `${s.icon} ${s.name} - כ-${s.duration} דקות\n`; });
          text += '\nהזמן משתנה לפי מורכבות העיצוב 💕';
          return text;
        },
        quickReplies: ['כמה עולה לק ג\'ל?', 'קביעת תור', 'שעות פעילות']
      },
      'חומרים': {
        answer: '✨ אני משתמשת רק בחומרים איכותיים מהמותגים המובילים:\n\n💅 CND\n💅 OPI\n💅 Gelish\n💅 Entity\n\nכל החומרים בטוחים, עמידים ולא פוגעים בציפורן הטבעית! 🌸',
        quickReplies: ['כמה עולה לק ג\'ל?', 'קביעת תור', 'כמה זמן מחזיק?']
      },
      'עמידות': {
        answer: '💪 לק הג\'ל מחזיק בין 2-3 שבועות!\n\nזה תלוי ב:\n✓ סוג הפעילות שלך\n✓ טיפול נכון בציפורניים\n✓ שימוש בכפפות בעבודות בית\n\nעם טיפול נכון - הלק יישאר מושלם! 💅✨',
        quickReplies: ['טיפים לשמירה', 'קביעת תור', 'כמה עולה לק ג\'ל?']
      },
      'טיפים': {
        answer: '💡 טיפים לשמירה על הלק:\n\n✓ השתמשי בכפפות בעבודות בית\n✓ הימנעי מחשיפה ממושכת למים חמים\n✓ שמרי על לחות הידיים\n✓ אל תקלפי את הלק בעצמך!\n✓ חזרי לטיפול כל 2-3 שבועות\n\nככה הציפורניים יישארו מושלמות! 💅✨',
        quickReplies: ['כמה זמן מחזיק?', 'קביעת תור', 'חומרים']
      },
      'ביטול': {
        answer: '🔄 ביטול או שינוי תור:\n\nאת יכולה לבטל או לשנות תור עד 24 שעות לפני המועד 📅\n\nפשוט שלחי לי הודעה בוואטסאפ או דרך האזור האישי באתר 💬',
        quickReplies: ['קביעת תור בוואטסאפ', 'דף הבית']
      },
      'תשלום': {
        answer: '💳 אפשרויות תשלום:\n\n✓ מזומן 💵\n✓ העברה בנקאית 🏦\n✓ ביט / פייבוקס 📱\n\nהתשלום מתבצע בסיום הטיפול 💅',
        quickReplies: ['כמה עולה לק ג\'ל?', 'קביעת תור', 'דף הבית']
      }
    };

    const intentKeywords = {
      'שעות פעילות': ['שעות', 'פעילות', 'פתוח', 'סגור', 'מתי', 'זמינה', 'עובדת', 'ימים'],
      'מחיר': ['מחיר', 'עולה', 'כמה', 'עלות', 'לק ג\'ל', 'מחירון', 'טיפסים', 'בנייה'],
      'מיקום': ['איפה', 'מיקום', 'כתובת', 'נמצאת', 'הגעה', 'חניה', 'מפה'],
      'תור': ['תור', 'קביעה', 'לקבוע', 'זימון', 'פגישה'],
      'כמה זמן': ['כמה זמן', 'משך', 'זמן טיפול', 'דקות', 'כמה לוקח'],
      'חומרים': ['חומרים', 'מוצרים', 'איכות', 'מותגים', 'בטוח'],
      'עמידות': ['מחזיק', 'עמיד', 'נשאר', 'עמידות'],
      'טיפים': ['טיפים', 'שמירה', 'לשמור', 'המלצות'],
      'ביטול': ['ביטול', 'לבטל', 'שינוי', 'לשנות', 'ביטלתי'],
      'תשלום': ['תשלום', 'לשלם', 'מזומן', 'ביט', 'אשראי']
    };

    function findIntent(message) {
      const lower = message.toLowerCase();
      for (const [intent, keywords] of Object.entries(intentKeywords)) {
        for (const kw of keywords) {
          if (lower.includes(kw)) return intent;
        }
      }
      return null;
    }

    function addMessage(text, isUser = false, quickReplies = []) {
      const div = document.createElement('div');
      div.className = `chat-message ${isUser ? 'message-user' : 'message-bot'}`;
      const avatar = document.createElement('div');
      avatar.className = `message-avatar ${isUser ? 'user-avatar' : 'bot-avatar'}`;
      avatar.textContent = isUser ? '👤' : '💅';
      const bubble = document.createElement('div');
      bubble.className = `message-bubble ${isUser ? 'user-bubble' : 'bot-bubble'}`;
      bubble.innerHTML = text.replace(/\n/g, '<br>');
      div.appendChild(avatar);
      div.appendChild(bubble);
      chatMessages.appendChild(div);
      if (quickReplies.length > 0) {
        const repliesDiv = document.createElement('div');
        repliesDiv.className = 'quick-replies';
        quickReplies.forEach(reply => {
          const btn = document.createElement('button');
          btn.className = 'quick-reply-btn';
          btn.textContent = reply;
          btn.onclick = () => handleQuickReply(reply);
          repliesDiv.appendChild(btn);
        });
        chatMessages.appendChild(repliesDiv);
      }
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'chat-message message-bot'; div.id = 'typingIndicator';
      const avatar = document.createElement('div');
      avatar.className = 'message-avatar bot-avatar'; avatar.textContent = '💅';
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble bot-bubble typing-indicator';
      bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      div.appendChild(avatar); div.appendChild(bubble);
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTyping() {
      document.getElementById('typingIndicator')?.remove();
    }

    function handleMessage(message) {
      if (!message.trim()) return;
      addMessage(message, true);
      chatInput.value = '';
      showTyping();
      setTimeout(() => {
        hideTyping();
        const intent = findIntent(message);
        if (intent && faqData[intent]) {
          addMessage(faqData[intent].answer, false, faqData[intent].quickReplies);
        } else {
          addMessage(
            'מצטערת, לא הבנתי את השאלה 😅\n\nאת יכולה לשאול אותי על:\n• שעות פעילות\n• מחירים\n• מיקום\n• קביעת תור\n\nאו פשוט לחצי על אחד הכפתורים למטה 👇',
            false,
            ['שעות פעילות', 'כמה עולה לק ג\'ל?', 'קביעת תור']
          );
        }
      }, 1000);
    }

    function handleQuickReply(reply) {
      if (reply === 'קביעת תור באתר') { window.location.href = 'booking.html'; return; }
      if (reply === 'קביעת תור בוואטסאפ') { window.open('https://wa.me/972546827299?text=היי%20אופק!%20אשמח%20לקבוע%20תור%20💅', '_blank'); return; }
      if (reply === 'קבלת כתובת בוואטסאפ') { window.open('https://wa.me/972546827299?text=היי%20אופק!%20אשמח%20לקבל%20את%20הכתובת%20המדויקת%20🗺️', '_blank'); return; }
      if (reply === 'דף הבית') { window.location.href = 'index.html'; return; }
      handleMessage(reply);
    }

    sendBtn.addEventListener('click', () => handleMessage(chatInput.value));
    chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleMessage(chatInput.value); });

    initChatbot();
  </script>
</body>
</html>
